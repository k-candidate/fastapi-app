name: Bake Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (auto-filled on release)'
        required: false
        default: ''
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches:
      - main
  release:
    types: [published]

jobs:
  determine-version:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
    steps:
      - name: Checkout tagged commit
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - id: set-version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            tag=$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" | sort -V | tail -n1)
            if [ -z "$tag" ]; then
              echo "No tag found for workflow_run SHA ${{ github.event.workflow_run.head_sha }}" >&2
              exit 1
            fi
            echo "version=$tag" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version || 'manually-triggered' }}" >> "$GITHUB_OUTPUT"
          fi

  bake:
    needs: determine-version
    uses: k-candidate/gha-workflows/.github/workflows/docker-bake.yaml@main
    secrets:
      dockerhub_username: ${{ secrets.DOCKERHUB_USER }}
      dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
    with:
      bake-file: ./docker-bake.hcl
      version: ${{ needs.determine-version.outputs.version }}
